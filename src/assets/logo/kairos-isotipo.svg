<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!--
    Kairos Isotipo
    ─────────────────────────────────────────────────
    Geometría:
      u = 50  |  centro = (200, 200)
      Chacana : polígono 20 vértices (base_block × 4 rotaciones de 90°)
      Círculo : R = 1.925 × u = 96.25
      Flor    : 19 círculos, r = R/3 ≈ 32.083
                anillo 1 d=r  anillo 2 d=r√3  anillo 3 d=2r

    Colores:
      Sobreescribe las variables CSS para cambiar el tema:
        --logo-color-from   (inicio del gradiente, defecto #A78BFA)
        --logo-color-to     (fin   del gradiente, defecto #F472B6)
  ─────────────────────────────────────────────────
  -->
  <defs>
    <style>
      :root {
        --logo-color-from: #A78BFA;
        --logo-color-to:   #F472B6;
      }
    </style>

    <!-- Gradiente diagonal 135 ° que sigue la paleta de la marca -->
    <linearGradient id="g" x1="350" y1="50" x2="50" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="var(--logo-color-from, #A78BFA)"/>
      <stop offset="1" stop-color="var(--logo-color-to, #F472B6)"/>
    </linearGradient>

    <!-- Clip: recorta la Flor de la Vida al interior del círculo grande -->
    <clipPath id="clip">
      <circle cx="200" cy="200" r="96.25"/>
    </clipPath>
  </defs>

  <!-- ── Chacana (20 vértices, cruz escalonada 3 niveles, u=50) ─────── -->
  <!--
    Construcción por cuadrante (math coords Y-up → SVG Y-down):
      Q1 base  : (1,-3)(1,-2)(2,-2)(2,-1)(3,-1)
      Q2 +90°  : (3,1)(2,1)(2,2)(1,2)(1,3)
      Q3 +180° : (-1,3)(-1,2)(-2,2)(-2,1)(-3,1)
      Q4 +270° : (-3,-1)(-2,-1)(-2,-2)(-1,-2)(-1,-3)
    SVG: x=200+col×u  y=200-fila×u
  -->
  <polygon
    points="
      250,350 250,300 300,300 300,250 350,250
      350,150 300,150 300,100 250,100 250,50
      150,50  150,100 100,100 100,150 50,150
      50,250  100,250 100,300 150,300 150,350
    "
    stroke="url(#g)"
    stroke-width="3.5"
    stroke-linejoin="miter"
  />

  <!-- ── Círculo grande, R = 96.25 ─────────────────────────────────── -->
  <circle cx="200" cy="200" r="96.25" stroke="url(#g)" stroke-width="3"/>

  <!-- ── Flor de la Vida: 19 círculos, r=32.083, recortados ────────── -->
  <g clip-path="url(#clip)" stroke="url(#g)" stroke-width="2.2">

    <!-- Centro -->
    <circle cx="200"     cy="200"     r="32.083"/>

    <!-- Anillo 1 — d = r = 32.083, ángulos 0°/60°/120°/180°/240°/300° -->
    <circle cx="232.083" cy="200"     r="32.083"/>
    <circle cx="216.042" cy="172.208" r="32.083"/>
    <circle cx="183.958" cy="172.208" r="32.083"/>
    <circle cx="167.917" cy="200"     r="32.083"/>
    <circle cx="183.958" cy="227.792" r="32.083"/>
    <circle cx="216.042" cy="227.792" r="32.083"/>

    <!-- Anillo 2 — d = r√3 = 55.570, ángulos 30°/90°/150°/210°/270°/330° -->
    <circle cx="248.124" cy="172.215" r="32.083"/>
    <circle cx="200"     cy="144.430" r="32.083"/>
    <circle cx="151.876" cy="172.215" r="32.083"/>
    <circle cx="151.876" cy="227.785" r="32.083"/>
    <circle cx="200"     cy="255.570" r="32.083"/>
    <circle cx="248.124" cy="227.785" r="32.083"/>

    <!-- Anillo 3 — d = 2r = 64.167, ángulos 0°/60°/120°/180°/240°/300° -->
    <circle cx="264.167" cy="200"     r="32.083"/>
    <circle cx="232.083" cy="144.430" r="32.083"/>
    <circle cx="167.917" cy="144.430" r="32.083"/>
    <circle cx="135.833" cy="200"     r="32.083"/>
    <circle cx="167.917" cy="255.570" r="32.083"/>
    <circle cx="232.083" cy="255.570" r="32.083"/>

  </g>
</svg>
